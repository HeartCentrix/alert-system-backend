version: "3.9"

services:
  db:
    image: postgres:16-alpine
    # POSTGRES_USER / POSTGRES_PASSWORD / POSTGRES_DB are supplied from the
    # local .env file — no credential literals in version control
    # (security review finding D-C1).
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # NO ports exposed — only reachable via internal Docker network

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    # NO ports exposed — only reachable via internal Docker network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    # DATABASE_URL / REDIS_URL come from .env (loaded via env_file below).
    environment:
      - ENVIRONMENT=production
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery_worker:
    build: .
    environment:
      - ENVIRONMENT=production
      - SERVICE_TYPE=worker
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery_beat:
    build: .
    environment:
      - ENVIRONMENT=production
      - SERVICE_TYPE=beat
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data: